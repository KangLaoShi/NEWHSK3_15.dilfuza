        const dialogues = [
          {
            title: "1-Matn: 同乐 (Tónglè) & 王一雪 (Wáng Yīxuě)",
            lines: [
              { speaker: "杨同乐", ch: "您搬到蓝天小区一段时间了，觉得怎么样？", pinyin: "Nín bāndào Lántiān xiǎoqū yí duàn shíjiān le, juéde zěnmeyàng?", uz: "Siz Moviy osmon turar-joyiga ko'chib o'tganingizga biroz vaqt bo'ldi, qanday tuyulyapti?", ru: "Вы переехали в микрорайон 'Голубое небо' некоторое время назад, как вам?", en: "You've moved to Blue Sky community for a period of time, how do you feel?" },
              { speaker: "王一雪", ch: "小区环境挺好的，附近买东西也很方便，过马路就是超市。", pinyin: "Xiǎoqū huánjìng tǐng hǎo de, fùjìn mǎi dōngxi yě hěn fāngbiàn, guò mǎlù jiùshì chāoshì.", uz: "Majmua muhiti juda yaxshi, yaqin atrofda narsa sotib olish ham qulay, yo'ldan o'tsangiz supermarket bor.", ru: "Обстановка в микрорайоне очень хорошая, поблизости удобно делать покупки, через дорогу супермаркет.", en: "The community environment is quite good, buying things nearby is also convenient, just across the road is a supermarket." },
              { speaker: "杨同乐", ch: "平时孩子们在哪儿玩？", pinyin: "Píngshí háizimen zài nǎr wán?", uz: "Odatda bolalar qayerda o'ynashadi?", ru: "Обычно где играют дети?", en: "Where do children usually play?" },
              { speaker: "王一雪", ch: "小区里有很多树，孩子们放学后就在树下做游戏。你想买房子吗？", pinyin: "Xiǎoqū li yǒu hěnduō shù, háizimen fàngxué hòu jiù zài shù xià zuò yóuxì. Nǐ xiǎng mǎi fángzi ma?", uz: "Majmuada ko'p daraxtlar bor, bolalar maktabdan qaytgach, daraxtlar ostida o'ynashadi. Uy sotib olmoqchimisiz?", ru: "В микрорайоне много деревьев, дети после школы играют под деревьями. Вы хотите купить дом?", en: "There are many trees in the community, children play games under the trees after school. Do you want to buy a house?" },
              { speaker: "杨同乐", ch: "是。我想买一个大房子，让我爸妈过来跟我一起住。", pinyin: "Shì. Wǒ xiǎng mǎi yí gè dà fángzi, ràng wǒ bàmā guòlái gēn wǒ yìqǐ zhù.", uz: "Ha. Katta uy sotib olib, ota-onamni men bilan yashashga chaqirmoqchiman.", ru: "Да. Я хочу купить большой дом, чтобы мои родители переехали жить со мной.", en: "Yes. I want to buy a big house and let my parents come over to live with me." },
              { speaker: "王一雪", ch: "蓝天小区的老人挺多的，这几年小区根据他们的需要，有了很多变化。", pinyin: "Lántiān xiǎoqū de lǎorén tǐng duō de, zhè jǐ nián xiǎoqū gēnjù tāmen de xūyào, yǒule hěnduō biànhuà.", uz: "Moviy osmon majmuasida qariyalar ko'p, so'nggi yillarda majmua ularning ehtiyojlariga qarab juda o'zgardi.", ru: "В микрорайоне 'Голубое небо' довольно много пожилых людей, за последние несколько лет микрорайон сильно изменился в соответствии с их потребностями.", en: "There are quite a few elderly people in Blue Sky community, in recent years the community has made many changes according to their needs." },
              { speaker: "杨同乐", ch: "真不错！过几天我去蓝天小区看看。", pinyin: "Zhēn búcuò! Guò jǐ tiān wǒ qù Lántiān xiǎoqū kànkan.", uz: "Juda yaxshi! Bir necha kundan keyin Moviy osmon majmuasini borib ko'raman.", ru: "Действительно неплохо! Через несколько дней я пойду в микрорайон 'Голубое небо' посмотреть.", en: "Really nice! In a few days I'll go take a look at Blue Sky community." }
            ]
          },
          {
            title: "2-Matn: 同乐 (Tónglè) & 王一雪 (Wáng Yīxuě)",
            lines: [
              { speaker: "王一雪", ch: "假期我想去南京旅游，但是我不太了解那里。", pinyin: "Jiàqī wǒ xiǎng qù Nánjīng lǚyóu, dànshì wǒ bú tài liǎojiě nàlǐ.", uz: "Ta'tilda Nankingga sayohat qilmoqchiman, lekin u yerni unchalik bilmayman.", ru: "В отпуск я хочу поехать в Нанкин, но я плохо знаю это место.", en: "During the holiday I want to travel to Nanjing, but I don't know much about it." },
              { speaker: "杨同乐", ch: "我虽然不是南京人，可是我是在南京上的大学，可以说是半个南京人。", pinyin: "Wǒ suīrán bú shì Nánjīng rén, kěshì wǒ shì zài Nánjīng shàng de dàxué, kěyǐ shuō shì bàngè Nánjīng rén.", uz: "Men Nankinlik bo'lmasam ham, Nankinda universitetda o'qiganman, o'zimni yarim Nankinlik desam bo'ladi.", ru: "Хотя я не из Нанкина, я учился в университете в Нанкине, можно сказать, что я наполовину нанкинец.", en: "Although I'm not from Nanjing, I went to university in Nanjing, you could say I'm half a Nanjing local." },
              { speaker: "王一雪", ch: "太好了！你快给我介绍一下南京吧。", pinyin: "Tài hǎo le! Nǐ kuài gěi wǒ jièshào yíxià Nánjīng ba.", uz: "Juda yaxshi! Tezda menga Nankinni tanishtirib bering.", ru: "Отлично! Быстрее расскажи мне о Нанкине.", en: "Great! Quickly introduce Nanjing to me." },
              { speaker: "杨同乐", ch: "南京有两千年以上的历史，有老城、老街，还有很多有名的景点，每年去旅游的游客特别多。", pinyin: "Nánjīng yǒu liǎngqiān nián yǐshàng de lìshǐ, yǒu lǎochéng, lǎojiē, hái yǒu hěnduō yǒumíng de jǐngdiǎn, měinián qù lǚyóu de yóukè tèbié duō.", uz: "Nankin ikki ming yildan ortiq tarixga ega, eski shahar, eski ko'chalar, shuningdek, juda ko'p mashhur joylar bor, har yili sayohatchilar juda ko'p bo'ladi.", ru: "У Нанкина более чем двухтысячелетняя история, есть старый город, старые улицы, а также много известных достопримечательностей, туристов, приезжающих сюда каждый год, особенно много.", en: "Nanjing has a history of more than 2000 years, there's an old city, old streets, and many famous scenic spots, tourists who go there every year are especially numerous." },
              { speaker: "王一雪", ch: "除了这些以外，你再告诉我一些外地人不知道的地方。", pinyin: "Chúle zhèxiē yǐwài, nǐ zài gàosu wǒ yìxiē wàidì rén bù zhīdào de dìfang.", uz: "Bulardan tashqari, menga begona odamlar bilmaydigan ba'zi joylarni ayting.", ru: "Помимо этого, расскажи мне еще о некоторых местах, которые не знают приезжие.", en: "Besides these, tell me some places that outsiders don't know about." },
              { speaker: "杨同乐", ch: "那太多了，我得一点儿一点儿给您讲。", pinyin: "Nà tài duō le, wǒ děi yìdiǎnr yìdiǎnr gěi nín jiǎng.", uz: "Ular juda ko'p, men sizga oz-ozdan aytib berishim kerak.", ru: "Их слишком много, я должен рассказывать вам понемногу.", en: "There are too many, I have to tell you little by little." },
              { speaker: "王一雪", ch: "行，下班后我请你吃晚饭，咱们边吃边聊。", pinyin: "Xíng, xiàbān hòu wǒ qǐng nǐ chī wǎnfàn, zánmen biān chī biān liáo.", uz: "Yaxshi, ishdan keyin sizni kechki ovqatga taklif qilaman, ovqatlanib suhbatlashamiz.", ru: "Хорошо, после работы я угощу тебя ужином, поедим и поболтаем.", en: "Okay, after work I'll treat you to dinner, we can eat and chat." }
            ]
          },
          {
            title: "3-Matn: 王一雪 (Wáng Yīxuě) & 刘小明 (Liú Xiǎomíng)",
            lines: [
              { speaker: "王一雪", ch: "小明，中国有一条大河，它的名字跟颜色有关系，你知道是什么河吗？", pinyin: "Xiǎomíng, Zhōngguó yǒu yì tiáo dà hé, tā de míngzi gēn yánsè yǒu guānxi, nǐ zhīdào shì shénme hé ma?", uz: "Syaomin, Xitoyda bir katta daryo bor, uning nomi rang bilan bog'liq, qanday daryoligini bilasizmi?", ru: "Сяомин, в Китае есть большая река, ее название связано с цветом, ты знаешь, что это за река?", en: "Xiaoming, China has a big river, its name is related to a color, do you know what river it is?" },
              { speaker: "刘小明", ch: "我知道，是黄河！", pinyin: "Wǒ zhīdào, shì Huáng Hé!", uz: "Bilaman, bu Xuanxe daryosi!", ru: "Я знаю, это Хуанхэ!", en: "I know, it's the Yellow River!" },
              { speaker: "王一雪", ch: "你说对了。我再问问你，你知道它为什么叫黄河吗？", pinyin: "Nǐ shuō duì le. Wǒ zài wènwen nǐ, nǐ zhīdào tā wèishénme jiào Huáng Hé ma?", uz: "To'g'ri aytdingiz. Yana so'rayman, nima uchun u Xuanxe (Sariq daryo) deb atalishini bilasizmi?", ru: "Ты прав. Я еще спрошу тебя, ты знаешь, почему она называется Хуанхэ?", en: "You're right. Let me ask you again, do you know why it's called the Yellow River?" },
              { speaker: "刘小明", ch: "因为河水看起来是黄色的，所以叫这个名字。黄河是中国最长的河吗？", pinyin: "Yīnwèi héshuǐ kàn qǐlái shì huángsè de, suǒyǐ jiào zhège míngzi. Huáng Hé shì Zhōngguó zuì cháng de hé ma?", uz: "Chunki daryo suvi sariq rangda ko'rinadi, shuning uchun shunday ataladi. Xuanxe Xitoydagi eng uzun daryomi?", ru: "Потому что вода в реке кажется желтой, поэтому она так называется. Хуанхэ - самая длинная река в Китае?", en: "Because the river water looks yellow, so it has this name. Is the Yellow River the longest river in China?" },
              { speaker: "王一雪", ch: "不是。黄河虽然不是最长的河，可是在历史上很重要。", pinyin: "Bú shì. Huáng Hé suīrán bú shì zuì cháng de hé, kěshì zài lìshǐ shàng hěn zhòngyào.", uz: "Yo'q. Xuanxe garchi eng uzun daryo bo'lmasa ham, tarixda juda muhim ahamiyatga ega.", ru: "Нет. Хотя Хуанхэ не самая длинная река, но в истории она очень важна.", en: "No. Although the Yellow River is not the longest river, it is very important in history." },
              { speaker: "刘小明", ch: "这个我知道。很久以前，很多中国人都住在黄河边上。", pinyin: "Zhège wǒ zhīdào. Hěn jiǔ yǐqián, hěnduō Zhōngguó rén dōu zhù zài Huáng Hé biān shàng.", uz: "Buni bilaman. Uzoq o'tmishda ko'plab xitoyliklar Xuanxe daryosi bo'yida yashashgan.", ru: "Это я знаю. Давным-давно многие китайцы жили на берегах Хуанхэ.", en: "I know this. A long time ago, many Chinese people lived along the banks of the Yellow River." },
              { speaker: "王一雪", ch: "对。在我们中国人看来，黄河像妈妈一样，养了我们几千年。", pinyin: "Duì. Zài wǒmen Zhōngguó rén kànlái, Huáng Hé xiàng māma yíyàng, yǎng le wǒmen jǐqiān nián.", uz: "To'g'ri. Biz xitoyliklar nazarda, Xuanxe daryosi onamizga o'xshaydi, bizni ming yillar davomida boqib kelgan.", ru: "Да. На наш, китайцев, взгляд, Хуанхэ как мать, кормила нас тысячелетиями.", en: "Right. In the eyes of us Chinese, the Yellow River is like a mother, raising us for thousands of years." }
            ]
          },
          {
            title: "4-Matn: 王一雪's Diary",
            lines: [
              { speaker: "日记", ch: "我小时候住在北京的西北边，有一条非常有名的河经过那里。", pinyin: "Wǒ xiǎoshíhou zhù zài Běijīng de xīběi biān, yǒu yì tiáo fēicháng yǒumíng de hé jīngguò nàlǐ.", uz: "Bolaligimda Pekinning shimoli-g'arbida yashardim, u yerdan juda mashhur bir daryo o'tardi.", ru: "В детстве я жил на северо-западе Пекина, там протекала очень известная река.", en: "When I was young I lived in the northwest of Beijing, a very famous river passed by there." },
              { speaker: "日记", ch: "我家就住在河边。那里有高高的大树和绿绿的草地。", pinyin: "Wǒ jiā jiù zhù zài hébiān. Nàlǐ yǒu gāogāo de dàshù hé lǜlǜ de cǎodì.", uz: "Uyimiz aynan daryo bo'yida edi. U yerda baland daraxtlar va yam-yashil o'tloqlar bor edi.", ru: "Мой дом находился прямо у реки. Там были высокие деревья и зеленые луга.", en: "My house was right by the river. There were tall trees and green meadows there." },
              { speaker: "日记", ch: "春天，河边的花都开了，看起来特别漂亮。还记得小时候，一到夏天我就去河里游泳。", pinyin: "Chūntiān, hébiān de huā dōu kāi le, kàn qǐlái tèbié piàoliang. Hái jìde xiǎoshíhou, yídào xiàtiān wǒ jiù qù héli yóuyǒng.", uz: "Bahorda daryo bo'yidagi gullar ochilardi, juda chiroyli ko'rinardi. Bolaligim esimda, yoz kelishi bilan daryoga cho'milishga borardim.", ru: "Весной у реки распускались все цветы, выглядело это особенно красиво. Еще помню в детстве, как только наступало лето, я шел купаться в реке.", en: "In spring, all the flowers by the river bloomed, it looked especially beautiful. Still remember when I was young, as soon as summer came I would go swim in the river." },
              { speaker: "日记", ch: "长大以后，遇到什么不开心的事情，我就去河边的树下坐着，听听鸟叫，看看河水，跟遇见的朋友聊聊天儿，难过的事情不一会儿就忘了。那是我最喜欢的地方。", pinyin: "Zhǎngdà yǐhòu, yùdào shénme bù kāixīn de shìqing, wǒ jiù qù hébiān de shù xià zuòzhe, tīngting niǎo jiào, kànkan héshuǐ, gēn yùjiàn de péngyou liáoliao tiānr, nánguò de shìqing bù yíhuìr jiù wàng le. Nà shì wǒ zuì xǐhuan de dìfang.", uz: "Katta bo'lganimdan keyin, xafa qiladigan biron voqea yuz bersa, daryo bo'yidagi daraxt ostiga borib o'tiraman, qushlar sayrashini eshitaman, daryo suviga qarayman, uchratgan do'stlarim bilan suhbatlashaman, va qiyin narsalar bir pasda yoddan ko'tariladi. Bu mening eng sevimli joyim.", ru: "Повзрослев, когда случалось что-то неприятное, я шел посидеть под деревом у реки, послушать пение птиц, посмотреть на воду, поболтать со встреченными друзьями, и грустные вещи вскоре забывались. Это мое любимое место.", en: "After growing up, whenever I encountered something unhappy, I would go sit under the tree by the river, listen to the birds, look at the river water, chat with friends I met, and sad things would soon be forgotten. That is my favorite place." }

        const grammarTestQuestions = [

        // --- UTILS ---
        const speakText = (text) => {
          if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            window.speechSynthesis.speak(utterance);
          }
        };

        const shuffleArray = (array) => {
          return [...array].sort(() => Math.random() - 0.5);
        };

        // --- COMPONENTS ---
        const Flashcards = () => {
          const [currentIndex, setCurrentIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);

          const word = vocabulary[currentIndex];

          const nextCard = () => {
            setIsFlipped(false);
            setTimeout(() => setCurrentIndex((prev) => (prev + 1) % vocabulary.length), 150);
          };

          const prevCard = () => {
            setIsFlipped(false);
            setTimeout(() => setCurrentIndex((prev) => (prev - 1 + vocabulary.length) % vocabulary.length), 150);
          };

          return (
            <div className="flex flex-col items-center justify-center space-y-8 mt-10">
              <div 
                className="relative w-80 h-96 cursor-pointer"
                style={{ perspective: "1000px" }}
                onClick={() => setIsFlipped(!isFlipped)}
              >
                <div 
                  className="absolute w-full h-full transition-transform duration-500"
                  style={{ transformStyle: "preserve-3d", transform: isFlipped ? "rotateY(180deg)" : "rotateY(0deg)" }}
                >
                  {/* Front */}
                  <div 
                    className="absolute w-full h-full flex flex-col items-center justify-center rounded-3xl shadow-2xl bg-slate-800 border border-white/20"

                  >
                    <button 
                       onClick={(e) => { e.stopPropagation(); speakText(word.ch); }}
                       className="absolute top-4 right-4 p-2 rounded-full bg-white/10 hover:bg-white/30 transition-colors"
                    >
                      <Volume2 size={24} className="text-teal-400" />
                    </button>
                    <span className="text-8xl font-bold text-white drop-shadow-lg">{word.ch}</span>
                  </div>

                  {/* Back */}
                  <div 
                    className="absolute w-full h-full flex flex-col items-center justify-center p-6 text-center rounded-3xl shadow-2xl bg-slate-800 border border-teal-500/30" 
                    style={{ backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", transform: "rotateY(180deg)" }}
                  >
                     <button 
                       onClick={(e) => { e.stopPropagation(); speakText(word.ch); }}
                       className="absolute top-4 right-4 p-2 rounded-full bg-white/10 hover:bg-white/30 transition-colors"
                    >
                      <Volume2 size={24} className="text-teal-400" />
                    </button>
                    <span className="text-4xl font-semibold text-teal-300 mb-4">{word.pinyin}</span>
                    <span className="text-2xl text-white font-medium mb-2">{word.uz}</span>
                    <span className="text-xl text-slate-300 mb-2">{word.ru}</span>
                    <span className="text-lg text-slate-400 italic">{word.en}</span>
                  </div>
                </div>
              </div>

              <div className="flex items-center space-x-6">
                <button onClick={prevCard} className="p-3 rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors">
                  <ChevronLeft size={30} />
                </button>
                <span className="text-slate-300 font-medium">
                  {currentIndex + 1} / {vocabulary.length}
                </span>
                <button onClick={nextCard} className="p-3 rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors">
                  <ChevronRight size={30} />
                </button>

            </div>
          );
        };

        const VocabTest = () => {
          const [questions, setQuestions] = useState([]);
          const [currentIdx, setCurrentIdx] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selectedOption, setSelectedOption] = useState(null);

          useEffect(() => {
            generateQuestions();
          }, []);

          const generateQuestions = () => {
            const shuffledVocab = shuffleArray([...vocabulary]);
            const generated = shuffledVocab.map(word => {
              let distractors = vocabulary.filter(v => v.ch !== word.ch);
              distractors = shuffleArray(distractors).slice(0, 3).map(v => v.uz);
              const options = shuffleArray([...distractors, word.uz]);
              return { q: word.ch, answer: word.uz, options };
            });
            setQuestions(generated);
            setCurrentIdx(0);
            setScore(0);
            setShowResult(false);
            setSelectedOption(null);
          };

          const handleOptionClick = (opt) => {
            if (selectedOption !== null) return;
            setSelectedOption(opt);
            
            if (opt === questions[currentIdx].answer) {
              setScore(s => s + 1);
            }

            setTimeout(() => {
              if (currentIdx < questions.length - 1) {
                setCurrentIdx(c => c + 1);
                setSelectedOption(null);
              } else {
                setShowResult(true);
              }
            }, 1000);
          };

          if (questions.length === 0) return null;

          if (showResult) {
            return (
              <div className="flex flex-col items-center justify-center p-10 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 mt-10 max-w-md mx-auto text-center">

                <p className="text-xl text-teal-300 mb-6">Natija: {score} / {questions.length}</p>
                <button onClick={generateQuestions} className="flex items-center px-6 py-3 bg-gradient-to-r from-teal-500 to-blue-500 rounded-full text-white font-semibold hover:from-teal-400 hover:to-blue-400 transition-all">
                  <RotateCcw className="mr-2" size={20} /> Qayta boshlash
                </button>
              </div>
            );
          }

          const currentQ = questions[currentIdx];

          return (
            <div className="max-w-xl mx-auto mt-10">
              <div className="flex justify-between items-center mb-6 text-slate-300">
                <span className="font-medium">Savol {currentIdx + 1} / {questions.length}</span>
                <span className="font-medium text-teal-400">Ball: {score}</span>
              </div>
              
              <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 mb-6 flex flex-col items-center shadow-lg">
                <p className="text-slate-400 mb-2">Xitoycha so'zning to'g'ri tarjimasini tanlang:</p>
                <h2 className="text-7xl font-bold text-white mb-4 drop-shadow-md">{currentQ.q}</h2>
              </div>

              <div className="grid grid-cols-1 gap-4">
                {currentQ.options.map((opt, i) => {
                  let btnClass = "bg-white/5 border border-white/10 hover:bg-white/10 text-white";
                  if (selectedOption !== null) {
                    if (opt === currentQ.answer) btnClass = "bg-green-500/20 border-green-500 text-green-300";
                    else if (opt === selectedOption) btnClass = "bg-red-500/20 border-red-500 text-red-300";
                  }
                  return (
                    <button 
                      key={i}
                      onClick={() => handleOptionClick(opt)}
                      disabled={selectedOption !== null}
                      className={`p-4 rounded-xl text-lg font-medium transition-all ${btnClass}`}
                    >
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        const Dialogues = () => {
          return (
            <div className="max-w-4xl mx-auto mt-10 space-y-12">
              {dialogues.map((dialogue, dIdx) => (
                <div key={dIdx} className="bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 overflow-hidden shadow-lg">

                            >
                              <Volume2 size={20} className="text-slate-300" />
                            </button>
                          </div>
                          <p className="text-slate-300">{line.uz}</p>

                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        };

        const Grammar = () => {
          return (

        };

        const GrammarTest = () => {
          const [currentIdx, setCurrentIdx] = useState(0);

          const [showResult, setShowResult] = useState(false);
          const [selectedOption, setSelectedOption] = useState(null);

          const handleOptionClick = (opt) => {
            if (selectedOption !== null) return;
            setSelectedOption(opt);
            
            if (opt === grammarTestQuestions[currentIdx].answer) {
              setScore(s => s + 1);
            }

            setTimeout(() => {
              if (currentIdx < grammarTestQuestions.length - 1) {
                setCurrentIdx(c => c + 1);
                setSelectedOption(null);
              } else {
                setShowResult(true);
              }
            }, 1200);
          };

          const resetTest = () => {
            setCurrentIdx(0);
            setScore(0);
            setShowResult(false);
            setSelectedOption(null);
          }

          if (showResult) {
            return (
              <div className="flex flex-col items-center justify-center p-10 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 mt-10 max-w-md mx-auto text-center">
                <h2 className="text-3xl font-bold text-white mb-4">语法测试完成</h2>
                <p className="text-xl text-teal-300 mb-6">得分: {score} / {grammarTestQuestions.length}</p>
                <button onClick={resetTest} className="flex items-center px-6 py-3 bg-gradient-to-r from-teal-500 to-blue-500 rounded-full text-white font-semibold hover:from-teal-400 hover:to-blue-400 transition-all">
                  <RotateCcw className="mr-2" size={20} /> 再做一次
                </button>
              </div>
            );
          }

          const currentQ = grammarTestQuestions[currentIdx];

          return (
            <div className="max-w-xl mx-auto mt-10">
              <div className="flex justify-between items-center mb-6 text-slate-300">
                <span className="font-medium">题 {currentIdx + 1} / {grammarTestQuestions.length}</span>
                <span className="font-medium text-teal-400">得分: {score}</span>
              </div>
              
              <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 mb-6 flex flex-col items-center shadow-lg text-center">
                <h2 className="text-3xl font-bold text-white tracking-wider">{currentQ.q}</h2>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {currentQ.options.map((opt, i) => {
                  let btnClass = "bg-white/5 border border-white/10 hover:bg-white/10 text-white";
                  if (selectedOption !== null) {
                    if (opt === currentQ.answer) btnClass = "bg-green-500/20 border-green-500 text-green-300";
                    else if (opt === selectedOption) btnClass = "bg-red-500/20 border-red-500 text-red-300";
                  }
                  return (
                    <button 
                      key={i}
                      onClick={() => handleOptionClick(opt)}
                      disabled={selectedOption !== null}
                      className={`p-4 rounded-xl text-xl font-medium transition-all ${btnClass}`}
                    >
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        const FillInBlanks = () => {
          const [questions, setQuestions] = useState([]);
          const [currentIdx, setCurrentIdx] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selectedOption, setSelectedOption] = useState(null);

          useEffect(() => {
            setQuestions(shuffleArray([...fillInBlanksQuestions]));
          }, []);

          const handleOptionClick = (opt) => {
            if (selectedOption !== null) return;
            setSelectedOption(opt);
            
            if (opt === questions[currentIdx].answer) {
              setScore(s => s + 1);
            }

            setTimeout(() => {
              if (currentIdx < questions.length - 1) {
                setCurrentIdx(c => c + 1);
                setSelectedOption(null);
              } else {
                setShowResult(true);
              }
            }, 1200);
          };

          const resetTest = () => {
            setQuestions(shuffleArray([...fillInBlanksQuestions]));
            setCurrentIdx(0);
            setScore(0);
            setShowResult(false);
            setSelectedOption(null);
          };

          if (questions.length === 0) return null;

          if (showResult) {
            return (
              <div className="flex flex-col items-center justify-center p-10 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 mt-10 max-w-md mx-auto text-center">
                <h2 className="text-3xl font-bold text-white mb-4">Test Yakunlandi!</h2>
                <p className="text-xl text-teal-300 mb-6">Natija: {score} / {questions.length}</p>
                <button onClick={resetTest} className="flex items-center px-6 py-3 bg-gradient-to-r from-teal-500 to-blue-500 rounded-full text-white font-semibold hover:from-teal-400 hover:to-blue-400 transition-all">
                  <RotateCcw className="mr-2" size={20} /> Qayta boshlash
                </button>
              </div>
            );
          }

          const currentQ = questions[currentIdx];
          const blankDisplay = selectedOption !== null 
            ? <span className={`px-4 py-1 mx-2 rounded border-b-2 ${selectedOption === currentQ.answer ? 'text-green-400 border-green-400' : 'text-red-400 border-red-400'}`}>{selectedOption}</span> 
            : <span className="px-6 py-1 mx-2 border-b-2 border-slate-400 text-transparent">____</span>;

          return (
            <div className="max-w-2xl mx-auto mt-10">
              <div className="flex justify-between items-center mb-6 text-slate-300">
                <span className="font-medium">Savol {currentIdx + 1} / {questions.length}</span>
                <span className="font-medium text-teal-400">Ball: {score}</span>
              </div>
              
              <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-10 mb-8 flex flex-col items-center shadow-lg text-center">
                <h2 className="text-3xl leading-loose font-medium text-white">
                  {currentQ.sentenceParts[0]}
                  {blankDisplay}
                  {currentQ.sentenceParts[1]}
                </h2>
              </div>

              <div className="grid grid-cols-2 gap-4">
                {currentQ.options.map((opt, i) => {
                  let btnClass = "bg-white/5 border border-white/10 hover:bg-white/10 text-white";
                  if (selectedOption !== null) {
                    if (opt === currentQ.answer) btnClass = "bg-green-500/20 border-green-500 text-green-300";
                    else if (opt === selectedOption) btnClass = "bg-red-500/20 border-red-500 text-red-300";
                  }
                  return (
                    <button 
                      key={i}
                      onClick={() => handleOptionClick(opt)}
                      disabled={selectedOption !== null}
                      className={`p-4 rounded-xl text-2xl font-bold transition-all ${btnClass}`}
                    >
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        };

        function App() {
          const [activeTab, setActiveTab] = useState('flashcards');

          const tabs = [
            { id: 'flashcards', label: "Fleshkartalar" },
            { id: 'vocabTest', label: "Lug'at testi" },
            { id: 'dialogues', label: "Muloqot" },
            { id: 'grammar', label: "Grammatika" },
            { id: 'grammarTest', label: "Grammatika testi" },
            { id: 'fillBlanks', label: "So'zlarni to'ldirish" },
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 font-sans pb-20">
              <div className="max-w-6xl mx-auto px-4 py-10">
                
                {/* Header */}
                <header className="text-center mb-12">
                  <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 mb-3 drop-shadow-sm">
                    我是半个南京人
                  </h1>
                  <p className="text-slate-300 text-lg font-medium tracking-wide bg-white/5 inline-block px-4 py-1.5 rounded-full border border-white/10">
                    Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                  </p>
                </header>

                {/* Tabs Navigation */}
                <div className="flex flex-wrap justify-center gap-2 mb-8">
                  {tabs.map((tab) => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`px-5 py-2.5 rounded-full font-medium transition-all duration-300 border ${
                        activeTab === tab.id
                          ? "bg-teal-500/20 border-teal-400/50 text-teal-300 shadow-[0_0_15px_rgba(45,212,191,0.2)]"
                          : "bg-white/5 border-white/10 text-slate-400 hover:bg-white/10 hover:text-slate-200"
                      }`}
                    >
                      {tab.label}
                    </button>
                  ))}
                </div>

                {/* Content Area */}
                <div className="min-h-[500px]">
                  {activeTab === 'flashcards' && <Flashcards />}
                  {activeTab === 'vocabTest' && <VocabTest />}
                  {activeTab === 'dialogues' && <Dialogues />}
                  {activeTab === 'grammar' && <Grammar />}
                  {activeTab === 'grammarTest' && <GrammarTest />}
                  {activeTab === 'fillBlanks' && <FillInBlanks />}
                </div>

              </div>

              {/* Footer */}
              <footer className="fixed bottom-0 left-0 w-full bg-slate-900/80 backdrop-blur-lg border-t border-white/10 py-4 text-center">
                <p className="text-teal-500 font-medium text-sm">HSK 3 NEW3.0 - Lesson 15</p>
                <p className="text-slate-500 text-xs mt-1">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
